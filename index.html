<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tic-tac-toe</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=WDXL+Lubrifont+JP+N&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script src="ttt.js" defer></script>
    </head>
    <body>
        <div id="main-container">
            <button id="player-button">Player</button>
            <dialog id="open-modal" closedby="any">
                <input type="text" id="playerA-name" placeholder="Player 1" />
                <input type="text" id="playerB-name" placeholder="Player 2" />
                <button id="close-modal">cancel</button>
                <input type="submit" id="submit" />
            </dialog>
            <h2 id="player-status"></h2>
            <br />
            <div id="ttt-grid">
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
                <div class="card"><p class="display"></p></div>
            </div>
            <button id="reset">Reset</button>
        </div>
    </body>
</html>
